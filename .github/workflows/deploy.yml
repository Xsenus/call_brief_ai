name: Deploy To VPS

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

env:
  APP_NAME: call_brief_ai
  APP_BASE_DIR: /opt/call_brief_ai
  SERVICE_NAME: callbot.service

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies for validation
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Python files
        run: |
          python -m py_compile callbot_daemon.py get_telegram_chat_id.py

      - name: Build release archive
        run: |
          tar \
            --exclude-vcs \
            --exclude='.github' \
            --exclude='.venv' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.env' \
            --exclude='work' \
            --exclude='state.json' \
            -czf release.tar.gz .

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${VPS_PORT:-22}" -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Upload release bundle and deploy files
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          scp -P "${VPS_PORT:-22}" release.tar.gz deploy/remote_deploy.sh deploy/callbot.service "${VPS_USER}@${VPS_HOST}:/tmp/"

      - name: Run remote deployment
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          ssh -p "${VPS_PORT:-22}" "${VPS_USER}@${VPS_HOST}" \
            "chmod +x /tmp/remote_deploy.sh && \
            APP_NAME='${APP_NAME}' \
            APP_BASE_DIR='${APP_BASE_DIR}' \
            SERVICE_NAME='${SERVICE_NAME}' \
            bash /tmp/remote_deploy.sh /tmp/release.tar.gz '${GITHUB_SHA}' /tmp/callbot.service"
